<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Metehan ESK 26</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: #2ecc71; border: 5px solid white; display: block; margin: 20px auto; cursor: crosshair; }
        .info { font-size: 24px; margin: 10px; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="info">METEHAN | ESK 26 Maçı</div>
    <div id="scoreBoard">Skor: 0 | Kurtarılan: 0</div>
    
    <canvas id="game" width="600" height="400"></canvas>
    
    <p>Topu kaleye fırlatmak için ekrana TIKLA!</p>

    <script>
        const cvs = document.getElementById("game");
        const ctx = cvs.getContext("2d");

        let score = 0;
        let saves = 0;

        let ball = { x: 300, y: 350, r: 15, vx: 0, vy: 0, active: false };
        let goalie = { x: 275, y: 40, w: 50, h: 20, dir: 2 };
        let goal = { x: 150, y: 10, w: 300, h: 50 };

        function draw() {
            // Arka planı temizle
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            // Kale çizgisi
            ctx.strokeStyle = "white";
            ctx.lineWidth = 4;
            ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);

            // Kaleci (Kırmızı)
            ctx.fillStyle = "red";
            ctx.fillRect(goalie.x, goalie.y, goalie.w, goalie.h);
            goalie.x += goalie.dir;
            if(goalie.x < goal.x || goalie.x + goalie.w > goal.x + goal.w) goalie.dir *= -1;

            // Top (Beyaz)
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.stroke();

            if(ball.active) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // Kaleci kurtarışı
                if(ball.y < goalie.y + goalie.h && ball.x > goalie.x && ball.x < goalie.x + goalie.w) {
                    saves++;
                    reset();
                }
                // Gol kontrolü
                else if(ball.y < goal.y + goal.h && ball.x > goal.x && ball.x < goal.x + goal.w) {
                    score++;
                    reset();
                }
                // Dışarı çıkma
                if(ball.y < 0 || ball.x < 0 || ball.x > 600) reset();
            }

            document.getElementById("scoreBoard").innerText = `Skor: ${score} | Kurtarılan: ${saves}`;
            requestAnimationFrame(draw);
        }

        function reset() {
            ball.x = 300; ball.y = 350; ball.vx = 0; ball.vy = 0; ball.active = false;
        }

        cvs.addEventListener("mousedown", (e) => {
            if(!ball.active) {
                const rect = cvs.getBoundingClientRect();
                ball.vx = ((e.clientX - rect.left) - ball.x) * 0.1;
                ball.vy = ((e.clientY - rect.top) - ball.y) * 0.1;
                ball.active = true;
            }
        });

        draw();
    </script>
</body>
</html>
