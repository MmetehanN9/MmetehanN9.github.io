<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Müzik Platformum</title>
    <style>
        /* TASARIM (CSS) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }

        /* Sol Menü */
        .sidebar { width: 240px; background-color: #000; padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #282828; }
        .sidebar a { color: #b3b3b3; text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .sidebar a:hover { color: #fff; }
        .playlist-list { list-style: none; margin-top: 10px; border-top: 1px solid #282828; padding-top: 15px; }
        .playlist-list li { margin: 12px 0; color: #b3b3b3; cursor: pointer; font-size: 13px; }
        .playlist-list li:hover { color: #fff; }

        /* Ana İçerik */
        .main-content { flex: 1; background: linear-gradient(to bottom, #1e1e1e, #121212); overflow-y: auto; padding: 30px; padding-bottom: 120px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; margin-top: 20px; }
        
        /* Kartlar */
        .card { background-color: #181818; padding: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { background-color: #282828; transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 6px; margin-bottom: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .card h3 { font-size: 15px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 12px; color: #b3b3b3; }

        /* Alt Oynatıcı */
        .player-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background-color: #181818; border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; }
        .now-playing img { width: 56px; height: 56px; border-radius: 4px; object-fit: cover; }
        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        audio { filter: invert(100%) hue-rotate(180deg) brightness(1.5); height: 35px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="margin-bottom: 25px;"><a href="#" style="font-size: 22px; color: #1DB954;">MüzikKutusu</a></div>
        <nav style="display: flex; flex-direction: column; gap: 15px;">
            <a href="#">🏠 Ana Sayfa</a>
            <a href="#">🔍 Ara</a>
            <a href="#">📚 Kitaplığın</a>
        </nav>
        <ul class="playlist-list">
            <li style="font-weight: bold; color: white;">LİSTELERİN</li>
            <li>Sınav Odak Modu</li>
            <li>Fenerbahçe Tribün</li>
            <li>Gaming Night</li>
            <li>Video Edit Ritmleri</li>
        </ul>
    </div>

    <div class="main-content">
        <h1 id="greeting">Günaydın</h1>
        <div class="grid-container" id="music-grid">
            <p>Şarkılar yükleniyor...</p>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img src="https://via.placeholder.com/56" id="current-img" alt="Kapak">
            <div>
                <h4 id="current-title" style="font-size: 14px;">Bir şarkı seç</h4>
                <p id="current-artist" style="font-size: 11px; color: #b3b3b3;">Sanatçı</p>
            </div>
        </div>
        
        <div class="controls">
            <audio id="main-audio" controls src=""></audio>
        </div>

        <div style="width: 30%; text-align: right; color: #b3b3b3; font-size: 12px; padding-right: 20px;">
            🔊 Ses Aktif
        </div>
    </div>

    <script>
        const musicGrid = document.getElementById('music-grid');
        const audioPlayer = document.getElementById('main-audio');
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');
        const currentImg = document.getElementById('current-img');

        // Ücretsiz müzik API'sinden popüler şarkıları çekiyoruz
        async function fetchSongs() {
            try {
                // Jamendo API'si (Örnek kullanım için halka açık anahtar)
                const response = await fetch('https://api.jamendo.com/v3.0/tracks/?client_id=56d30c36&format=jsonpost&limit=12&order=popularity_week&include=musicinfo');
                const data = await response.json();
                const tracks = data.results;

                musicGrid.innerHTML = ''; // Yükleniyor yazısını sil

                tracks.forEach(track => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${track.image}" alt="${track.name}">
                        <h3>${track.name}</h3>
                        <p>${track.artist_name}</p>
                    `;
                    
                    // Karta tıklandığında şarkıyı çal
                    card.onclick = () => {
                        playSong(track.audio, track.name, track.artist_name, track.image);
                    };
                    
                    musicGrid.appendChild(card);
                });
            } catch (error) {
                musicGrid.innerHTML = '<p>Müzikler şu an yüklenemedi, internetini kontrol et!</p>';
                console.error("Hata:", error);
            }
        }

        function playSong(url, title, artist, img) {
            audioPlayer.src = url;
            currentTitle.innerText = title;
            currentArtist.innerText = artist;
            currentImg.src = img;
            audioPlayer.play();
        }

        // Karşılama mesajını saate göre güncelle
        const hour = new Date().getHours();
        const greeting = document.getElementById('greeting');
        if (hour < 12) greeting.innerText = "Günaydın";
        else if (hour < 18) greeting.innerText = "Tünaydın";
        else greeting.innerText = "İyi Akşamlar";

        // Sayfa açıldığında şarkıları getir
        fetchSongs();
    </script>
</body>
</html>
