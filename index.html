<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Metehan | ESK 26 Pro v2</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        .ui { padding: 15px; background: #1a1a1a; border-bottom: 2px solid #f1c40f; }
        canvas { background: #2ecc71; border: 5px solid white; display: block; margin: 20px auto; cursor: crosshair; border-radius: 15px; }
        .power-bar-container { width: 200px; height: 20px; background: #333; margin: 10px auto; border-radius: 10px; border: 2px solid white; overflow: hidden; }
        #powerBar { width: 0%; height: 100%; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); transition: width 0.1s; }
    </style>
</head>
<body>
    <div class="ui">
        <h2>METEHAN | ESK 26</h2>
        <div>Skor: <span id="s1" style="color:#3498db">0</span> | Kurtarılan: <span id="s2" style="color:#e74c3c">0</span></div>
        <div class="power-bar-container"><div id="powerBar"></div></div>
        <small>Topu geriye doğru çek ve bırak! (Güç göstergesine dikkat et)</small>
    </div>
    
    <canvas id="game" width="800" height="500"></canvas>

    <script>
        const cvs = document.getElementById("game");
        const ctx = cvs.getContext("2d");
        const pBar = document.getElementById("powerBar");

        let score = 0, saves = 0;
        let ball = { x: 400, y: 450, z: 0, r: 20, vx: 0, vy: 0, vz: 0, active: false };
        let goalie = { x: 400, y: 70, w: 60, h: 90, dir: 1 };
        let goal = { x: 200, y: 40, w: 400, h: 100 };
        
        let isAiming = false, dragX, dragY;

        function resetBall() {
            ball.x = 400; ball.y = 450; ball.z = 0; ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.active = false;
            pBar.style.width = "0%";
        }

        function draw() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);

            // 1. Sahayı ve Kaleyi Çiz
            ctx.strokeStyle = "white"; ctx.lineWidth = 4;
            ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);

            // 2. Kaleci Botu (Hareketi sınırlı ve daha gerçekçi)
            goalie.x += 5 * goalie.dir;
            if(goalie.x < goal.x + 30 || goalie.x > goal.x + goal.w - 30) goalie.dir *= -1;
            ctx.fillStyle = "red";
            ctx.fillRect(goalie.x - goalie.w/2, goalie.y, goalie.w, goalie.h);

            // 3. Nişan Alma Çizgisi
            if (isAiming) {
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(ball.x + (ball.x - dragX), ball.y + (ball.y - dragY));
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 4. Top ve 3D Efekti
            let scale = 1 - (ball.z / 1000);
            let px = ball.x; 
            let py = ball.y - (ball.z * 0.3); // Yükseklik hissi
            let pr = ball.r * scale;

            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI*2);
            ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = "black"; ctx.stroke();

            // 5. Fizik ve Çarpışma
            if (ball.active) {
                ball.x += ball.vx; ball.z += ball.vz;
                ball.vx *= 0.98; ball.vz *= 0.98;

                if (ball.z > 800) {
                    if (ball.x > goalie.x - goalie.w/2 && ball.x < goalie.x + goalie.w/2) {
                        saves++; resetBall();
                    } else if (ball.x > goal.x && ball.x < goal.x + goal.w) {
                        score++; resetBall();
                    } else { resetBall(); }
                }
                if (ball.x < 0 || ball.x > 800) resetBall();
            }

            document.getElementById("s1").innerText = score;
            document.getElementById("s2").innerText = saves;
            requestAnimationFrame(draw);
        }

        cvs.addEventListener("mousedown", (e) => {
            if (!ball.active) {
                isAiming = true;
                const r = cvs.getBoundingClientRect();
                dragX = e.clientX - r.left; dragY = e.clientY - r.top;
            }
        });

        cvs.addEventListener("mousemove", (e) => {
            if (isAiming) {
                const r = cvs.getBoundingClientRect();
                dragX = e.clientX - r.left; dragY = e.clientY - r.top;
                let dist = Math.sqrt(Math.pow(ball.x - dragX, 2) + Math.pow(ball.y - dragY, 2));
                pBar.style.width = Math.min(dist, 200) / 2 + "%";
            }
        });

        cvs.addEventListener("mouseup", (e) => {
            if (isAiming) {
                isAiming = false;
                const r = cvs.getBoundingClientRect();
                let dx = ball.x - (e.clientX - r.left);
                let dy = ball.y - (e.clientY - r.top);
                
                ball.vx = dx * 0.15;
                ball.vz = Math.sqrt(dx*dx + dy*dy) * 1.2; // Güç mekaniği
                ball.active = true;
            }
        });

        draw();
    </script>
</body>
</html>
