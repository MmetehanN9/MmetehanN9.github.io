<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Metehan | ESK 26 vs Rakip Takım</title>

        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        canvas { background: #2ecc71; border: 5px solid #fff; cursor: crosshair; margin-top: 20px; border-radius: 10px; }
        .ui { padding: 20px; }
        h1 { margin: 0; color: #f1c40f; text-transform: uppercase; }
        .teams { display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; margin-top: 10px; }
        .score { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>METEHAN</h1>
        <div class="teams">
            <div><span style="color: #3498db">ESK 26</span> (Sen)</div>
            <div>vs</div>
            <div><span style="color: #e74c3c">Rakip Takım</span> (Kaleci)</div>
        </div>
        <div class="score">Skor: <span id="scoreVal">0</span> | Kurtarılan: <span id="savedVal">0</span></div>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p>Topa tıkla, çek, ve kaleciyi aşmak için bırak!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const savedEl = document.getElementById('savedVal');

        let score = 0;
        let saved = 0;
        let ball = { x: 300, y: 350, r: 15, vx: 0, vy: 0, kicking: false };
        let goal = { x: 150, y: 20, w: 300, h: 60 };
        
        // --- YENİ KARAKTERLER ---
        // Kaleci (Rakip Takım)
        let goalie = { x: 300, y: 30, w: 40, h: 50, color: '#e74c3c', speed: 3, dx: 3 };
        
        // Futbolcu (Metehan - Sen)
        let kicker = { x: 300 - 50, y: 350, w: 50, h: 80, color: '#3498db' };

        function drawCharacter(char) {
            ctx.fillStyle = char.color;
            // Gövde
            ctx.fillRect(char.x, char.y + 15, char.w, char.h - 15);
            // Kafa
            ctx.beginPath();
            ctx.arc(char.x + char.w/2, char.y + 15, 15, 0, Math.PI*2);
            ctx.fill();
            ctx.closePath();
        }

        function aabbIntersect(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w && rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h && rect1.y + rect1.h > rect2.y;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sahayı Çiz
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.strokeRect(goal.x, goal.y, goal.w, goal.h); // Kaleyi çiz

            // --- YENİ ÇİZİMLER VE MANTIK ---
            // Futbolcuyu Çiz (Statik)
            drawCharacter(kicker);

            // Kaleciyi Çiz ve Hareket Ettir
            goalie.x += goalie.dx;
            // Kaleci sınır kontrolü (Kale direklerine çarpınca geri döner)
            if (goalie.x < goal.x || goalie.x + goalie.w > goal.x + goal.w) {
                goalie.dx *= -1;
            }
            drawCharacter(goalie);

            // Topu Çiz
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.strokeStyle = "black";
            ctx.stroke();
            ctx.closePath();

            if (ball.kicking) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vx *= 0.98; // Sürtünme
                ball.vy *= 0.98;
